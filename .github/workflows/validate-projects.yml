name: Validate project frontmatter

on:
  push:
    paths:
      - "projects/**/*.md"
  pull_request:
    paths:
      - "projects/**/*.md"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install python-frontmatter

      - name: Validate project frontmatter
        run: python .github/scripts/validate_projects.py
